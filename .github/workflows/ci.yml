name: CI Pipeline

on:
  push:
    branches: [ master, main, rag-only-optimized, 'fix/*' ]
  pull_request:
    branches: [ master, main, rag-only-optimized ]
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend Tests (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: go mod tidy

      - name: Start Docker Services
        working-directory: ./deployments
        run: |
          docker compose up -d
          echo "Waiting for services to be healthy..."
          # 简单的等待逻辑
          sleep 30

      - name: Run Backend Tests
        env:
          DATABASE_MYSQL_DSN: "root:PaiSmart2025@tcp(localhost:3307)/PaiSmart?charset=utf8mb4&parseTime=True&loc=Local"
          DATABASE_REDIS_ADDR: "localhost:6380"
          DATABASE_REDIS_PASSWORD: "PaiSmart2025"
          DATABASE_NEO4J_URI: "bolt://localhost:7687"
          DATABASE_NEO4J_USERNAME: "neo4j"
          DATABASE_NEO4J_PASSWORD: "PaiSmart2025"
          ELASTICSEARCH_ADDRESSES: "http://localhost:9200"
        run: go test -v -coverprofile=coverage.out ./...

  frontend-test:
    name: Frontend Tests (Vue 3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Lint & Typecheck
        working-directory: ./frontend
        run: |
          pnpm run lint
          pnpm run typecheck

      - name: Build
        working-directory: ./frontend
        run: pnpm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend Image
        run: docker build -t pai-smart:latest -f deployments/Dockerfile .

  code-review:
    name: Automated Code Review
    needs: [backend-test, frontend-test, docker-build]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Trigger Custom Code Review Agent
        run: |
          echo "Triggering Code Review Agent for PR #${{ github.event.pull_request.number }}"
          # 这里通常调用一个封装好的脚本或通知 Antigravity 系统进行审查
          # 示例：curl -X POST ...
